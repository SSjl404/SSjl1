<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语词根查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 20px}
h1{text-align:center;font-size:28px;margin-bottom:8px;color:#2c3e50}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:32px;font-size:14px}
.search-wrap{position:relative;margin-bottom:32px}
.search-wrap input{width:100%;padding:14px 18px;font-size:16px;border:2px solid #e2e8f0;border-radius:12px;outline:none;transition:.2s;background:#fff}
.search-wrap input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.15)}
.search-wrap input::placeholder{color:#94a3b8}
.stats{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:16px}
.roots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8ecf1;transition:.15s}
.card:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(99,102,241,.08)}
.card .root{font-size:17px;font-weight:700;color:#6366f1;margin-bottom:4px;font-family:"SF Mono","Fira Code","Consolas",monospace}
.card .meaning{font-size:14px;color:#475569;margin-bottom:6px}
.card .examples{font-size:12px;color:#94a3b8}
.card mark{background:#fef08a;color:#333;padding:0 2px;border-radius:2px}
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}
.empty .online-links{margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0}
.empty .online-links p{font-size:13px;margin-bottom:12px}
.empty .online-links a{display:inline-block;margin:0 8px 8px;padding:10px 20px;border-radius:8px;font-size:14px;text-decoration:none;transition:.15s;color:#fff}
.empty .online-links .link-etym{background:#6366f1}
.empty .online-links .link-etym:hover{background:#4f46e5}
.empty .online-links .link-wikt{background:#0891b2}
.empty .online-links .link-wikt:hover{background:#0e7490}
.online-hint{text-align:center;margin-top:28px;padding:16px;border-radius:10px;background:#f8fafc;border:1px dashed #cbd5e1;font-size:13px;color:#64748b}
.online-hint a{color:#6366f1;text-decoration:none;font-weight:600}
.online-hint a:hover{text-decoration:underline}
@media(max-width:500px){.container{padding:24px 16px}.roots-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>📖 英语词根查询</h1>
<p class="subtitle">输入词根快速查询含义与示例单词</p>
<div class="search-wrap">
<input type="text" id="searchInput" placeholder="输入词根，如 bio, graph, aud..." autofocus>
</div>
<div class="stats" id="stats">共 <strong>111</strong> 个词根</div>
<div class="roots-grid" id="rootsGrid"></div>
</div>
<script>

{root:"jur/jus",meaning:"法律, 权利",examples:"justice, jury, justify"},
{root:"labor",meaning:"工作",examples:"labor, collaborate, elaborate"},
{root:"leg/lect",meaning:"读, 选择",examples:"collect, select, lecture"},
{root:"liber",meaning:"自由",examples:"liberty, liberal, liberate"},

{root:"uni",meaning:"一, 单一",examples:"universal, uniform, unity"},
{root:"vac",meaning:"空",examples:"vacuum, vacant, vacation"},
{root:"val",meaning:"强, 价值",examples:"value, valid, equivalent"},
{root:"ven/vent",meaning:"来, 到来",examples:"prevent, event, adventure"},
{root:"ver",meaning:"真实",examples:"verify, verdict, version"},

{root:"voc/vok",meaning:"呼唤, 声音",examples:"voice, vocation, invoke"},

function encodeQuery(s){return encodeURIComponent(s.trim())}
function highlight(text,query){
if(!query)return text;
const re=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
return text.replace(re,'<mark>$1</mark>');
}
function onlineLinks(q){
const e=encodeQuery(q);
return '<div class="online-links"><p>在以下在线词典继续搜索：</p>'
+'<a class="link-etym" href="https://www.etymonline.com/search?q='+e+'" target="_blank">📖 etymonline</a>'
+'<a class="link-wikt" href="https://en.wiktionary.org/wiki/'+e+'" target="_blank">📖 Wiktionary</a></div>';
}
function render(query){
const q=query.trim().toLowerCase();
const filtered=q?roots.filter(r=>r.root.toLowerCase().includes(q)||r.meaning.includes(q)):roots;
const grid=document.getElementById('rootsGrid');
if(filtered.length===0){
grid.innerHTML='<div class="empty"><div class="icon">🔍</div><p>本地词根库未找到 "<strong>'+query+'</strong>"</p>'+onlineLinks(query)+'</div>';
document.getElementById('stats').textContent='共 '+roots.length+' 个词根 · 未找到匹配';
return;
}
document.getElementById('stats').innerHTML='共 <strong>'+roots.length+'</strong> 个词根 · 匹配 <strong>'+filtered.length+'</strong> 个';
grid.innerHTML=filtered.map(r=>'<div class="card"><div class="root">'+highlight(r.root,q)+'</div><div class="meaning">'+highlight(r.meaning,q)+'</div><div class="examples">'+highlight(r.examples,q)+'</div></div>').join('')
+'<div class="online-hint">没找到想要的？<a href="https://www.etymonline.com/search?q='+encodeQuery(query)+'" target="_blank">去 etymonline 查询</a> · <a href="https://en.wiktionary.org/wiki/'+encodeQuery(query)+'" target="_blank">Wiktionary</a></div>';
}
document.getElementById('searchInput').addEventListener('input',function(){render(this.value)});
render('');
</script>
</body>
</html>
